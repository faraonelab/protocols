on:
  push:
    branches: [ main ]

name: Quarto Publish Encrypted

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # THIS STEP WAS MISSING
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.0' # Matches the version in your renv/

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install R Dependencies
        uses: r-lib/actions/setup-renv@v2

      - name: Render and Encrypt
        run: |
          # 1. Build the site to the 'docs' folder
          quarto render
          
          # 2. Encrypt the entire 'docs' folder recursively
          # This replaces your files with encrypted versions automatically
          npx staticrypt@latest docs -r --password "${{ secrets.SITE_PASSWORD }}" --overwrite

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4