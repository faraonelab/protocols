on:
  push:
    branches: [ main ]

name: Quarto Publish Encrypted

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.0'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install R & Dependencies
        uses: r-lib/actions/setup-renv@v2

      - name: Install Staticrypt
        run: npm install -g staticrypt

      - name: Render and Encrypt
        run: |
          # 1. Build the site
          quarto render
          
          # 2. Force encryption on every HTML file found in the docs directory
          # The --overwrite flag replaces the original file with the locked version
          find docs -name "*.html" -exec staticrypt {} --password "${{ secrets.SITE_PASSWORD }}" --short --overwrite \;
          
          # 3. Verify files were actually changed
          echo "Verification: Checking file sizes..."
          ls -lh docs/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_orphan: true