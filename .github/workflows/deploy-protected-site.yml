name: Build and deploy protected Quarto site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Restore renv cache
        uses: actions/cache@v4
        with:
          path: renv/library
          key: ${{ runner.os }}-renv-${{ hashFiles('renv.lock') }}
          restore-keys: |
            ${{ runner.os }}-renv-

      - name: Restore R packages
        run: |
          Rscript -e "install.packages('renv', repos='https://cloud.r-project.org')"
          Rscript -e "renv::restore(prompt = FALSE)"

      - name: Install npm dependencies
        run: npm install

      - name: Render Quarto site
        run: quarto render

      - name: Add .nojekyll to output
        run: touch _site/.nojekyll

      - name: Prepare private site
        run: |
          mkdir -p _site/private
          find _site -maxdepth 1 -name "*.html" -exec mv {} _site/private/ \;
          [ -d _site/site_libs ] && mv _site/site_libs _site/private/ || true
          [ -d _site/images ] && mv _site/images _site/private/ || true
          [ -d _site/assets ] && mv _site/assets _site/private/ || true
          [ -f _site/styles.css ] && mv _site/styles.css _site/private/ || true

      - name: Create login gateway
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
        run: |
          npx staticrypt _site/private/index.html \
            -d _site \
            --title "Faraone Lab Protocols" \
            --instructions "Enter the password to access the protocols website."

      - name: Fix links for private subfolder
        run: |
          find _site/private -type f \( -name "*.html" -o -name "*.css" -o -name "*.js" \) -exec sed -i 's|href="/protocols/|href="/protocols/private/|g' {} +
          find _site/private -type f \( -name "*.html" -o -name "*.css" -o -name "*.js" \) -exec sed -i 's|src="/protocols/|src="/protocols/private/|g' {} +

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4