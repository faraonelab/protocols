name: Build and deploy protected Quarto site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    
  - name: Check out repository
    uses: actions/checkout@v4

  - name: Setup R
    uses: r-lib/actions/setup-r@v2

  - name: Setup Quarto
    uses: quarto-dev/quarto-actions/setup@v2

  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: "20"

  - name: Install Staticrypt
    run: npm install

  - name: Install R packages
    run: |
      Rscript -e "install.packages(c('tidyverse','knitr','rmarkdown'), repos='https://cloud.r-project.org')"

  - name: Render Quarto site
    run: quarto render

      - name: Install Staticrypt
        run: npm install

      - name: Render Quarto site
        run: quarto render

      - name: Add .nojekyll to output
        run: touch _site/.nojekyll

      - name: Protect site with Staticrypt
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
        run: npx staticrypt _site/* -r -d _site

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4