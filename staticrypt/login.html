<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{title}}</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
background:linear-gradient(135deg,#0b3d91,#1b6ec2);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.login-container{
background:white;
padding:40px;
border-radius:16px;
box-shadow:0 20px 40px rgba(0,0,0,0.25);
width:420px;
max-width:100%;
text-align:center;
}

.logo{
width:110px;
margin-bottom:20px;
}

h1{
margin:10px 0;
font-size:28px;
color:#0b3d91;
}

.subtitle{
color:#555;
margin-bottom:20px;
line-height:1.4;
}

.password-wrapper{
position:relative;
}

input{
width:100%;
padding:14px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
outline:none;
}

.toggle{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:14px;
color:#1b6ec2;
}

.remember{
margin-top:12px;
display:flex;
align-items:center;
gap:8px;
font-size:14px;
color:#444;
}

button{
margin-top:16px;
width:100%;
padding:14px;
background:#1b6ec2;
color:white;
border:none;
border-radius:8px;
font-size:16px;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#0b3d91;
}

#error{
color:#c62828;
margin-top:12px;
}

.footer{
margin-top:24px;
font-size:12px;
color:#888;
}

</style>
</head>

<body>

<div class="login-container">

<img src="logo.png" class="logo" alt="Faraone Lab logo">

<h1>Faraone Lab Protocols</h1>

<p class="subtitle">
Internal research protocols and documentation.<br>
Enter the password provided by the lab.
</p>

<form id="staticrypt-form">

<div class="password-wrapper">
<input id="staticrypt-password" type="password" placeholder="Password">
<span class="toggle" onclick="togglePassword()">Show</span>
</div>

<div class="remember">
<input type="checkbox" id="staticrypt-remember">
<label for="staticrypt-remember">Remember this device</label>
</div>

<button type="submit">Access Protocols</button>

<div id="staticrypt-error"></div>

</form>

<div class="footer">
Faraone Lab & CTRIC
</div>

</div>

<script>

function togglePassword(){
const p=document.getElementById("staticrypt-password");
p.type=p.type==="password"?"text":"password";
}

</script>

{{staticrypt_script}}

</body>
</html>
